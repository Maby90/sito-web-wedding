<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invito - Ilaria & Maby</title>
    <!-- Google Fonts for elegant typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Floral border overlays extracted from user's original invitation -->
    <div class="floral-overlay floral-top-right"></div>
    <div class="floral-overlay floral-bottom-right"></div>
    <div class="floral-overlay floral-bottom-left"></div>

    <div class="invitation-wrapper">
        <div class="invitation-content">
            
            <p class="fade-in step-1 subtitle">Ci sposiamo!</p>
            
            <h1 class="fade-in step-2 names">Ilaria e Maby</h1>
            
            <div class="fade-in step-3 date-time">
                <p class="date">Sabato 5 Settembre 2026</p>
                <p class="time">17:30</p>
            </div>
            
            <div class="fade-in step-4 location-box">
                <p class="location-intro">Saremo felici di avervi con noi presso:</p>
                <p class="location-name">Villa Le Sorti</p>
                <p class="location-address">Via del Pollaiolo 21, Lastra a Signa (FI)</p>
                <p class="rsvp-text">R. S. V. P.</p>
            </div>

            <div class="fade-in step-5 cta-container">
                <a href="/" class="btn-elegant">Scopri tutti i dettagli sul nostro sito</a>
            </div>

        </div>
    </div>

</body>
</html>
